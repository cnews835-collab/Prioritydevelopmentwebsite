kind = "web"
previewPath = "/"
title = "Commission Agency"
version = "1.0.0"
id = "artifacts/agency-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19242
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/agency-site run dev"

[services.env]
PORT = "19242"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/agency-site", "run", "build"]
publicDir = "artifacts/agency-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
